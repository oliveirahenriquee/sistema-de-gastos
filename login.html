<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Controle Financeiro</title>
</head>
<body>
    <div class="login-card">
        <h2 id="titulo">Entrar</h2>
        <form id="formAuth">
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit" id="btnAcao">ACESSAR</button>
            <link rel="stylesheet" href="login.css">
        </form>
        <p class="toggle" onclick="alternarModo()" id="btnToggle">Não tem uma conta? Cadastre-se</p>
    </div>

    <script>

        const URL_API = ""; // Vazio significa que o front-end vai usar o mesmo endereço do servidor que o hospeda

        let modoLogin = true;

        async function autenticar(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const rota = modoLogin ? '/login' : '/registrar';

            try {
                const resp = await fetch(rota, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const dados = await resp.json();

                if (resp.ok) {
                    if (modoLogin) {
                        localStorage.setItem('token', dados.token); // Salva o crachá
                        window.location.href = 'index.html'; // Entra no sistema
                    } else {
                        alert("Usuário criado! Agora faça o login.");
                        alternarModo();
                    }
                } else {
                    alert(dados.error || "Erro na autenticação");
                }
            } catch (err) {
                alert("Erro ao conectar com o servidor.");
            }
        }

        function alternarModo() {
            modoLogin = !modoLogin;
            document.getElementById('titulo').innerText = modoLogin ? 'Entrar' : 'Criar Conta';
            document.getElementById('btnAcao').innerText = modoLogin ? 'ACESSAR' : 'CADASTRAR';
            document.getElementById('btnToggle').innerText = modoLogin ? 'Não tem conta? Cadastre-se' : 'Já tenho conta, entrar';
        }

        document.getElementById('formAuth').addEventListener('submit', autenticar);
    </script>
</body>
</html>
