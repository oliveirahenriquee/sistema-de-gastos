<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle Financeiro</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-card">
        <h2 id="titulo">Entrar</h2>
        <form id="formAuth" novalidate>
            <div class="form-field" id="campoEmail">
                <input type="email" id="email" placeholder="E-mail" required>
                <span class="field-error" id="emailError"></span>
            </div>
            <div class="form-field" id="campoSenha">
                <input type="password" id="senha" placeholder="Senha" required>
                <button type="button" id="btn-mostrar-senha" aria-label="Mostrar senha">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
                <span class="field-error" id="senhaError"></span>
            </div>
            <button type="submit" id="btnAcao">ACESSAR</button>
        </form>
        
        <p class="toggle" onclick="alternarModo()" id="btnToggle">Não tem uma conta? Cadastre-se</p>
        <p class="toggle" onclick="modoEsqueciSenha()" id="btnEsqueci" style="margin-top: 8px; color: #00d2ff; font-size: 0.9em;">Esqueci minha senha</p>
    </div>

    <script>
        const URL_API = window.location.origin;

        let estadoTela = 'login'; 

        const formAuth = document.getElementById('formAuth');
        const camposAuth = [
            { id: 'email', nome: 'E-mail', tipo: 'email' },
            { id: 'senha', nome: 'Senha' }
        ];

        function limparErrosAuth() {
            camposAuth.forEach(campo => {
                const input = document.getElementById(campo.id);
                const erro = document.getElementById(`${campo.id}Error`);
                if (input) input.classList.remove('input-error', 'input-valid');
                if (erro) erro.innerText = '';
            });
        }

        function mostrarErroAuth(id, mensagem) {
            const input = document.getElementById(id);
            const erro = document.getElementById(`${id}Error`);
            if (input) {
                input.classList.add('input-error');
                input.classList.remove('input-valid');
            }
            if (erro) erro.innerText = mensagem;
        }

        function validarFormularioAuth() {
            limparErrosAuth();
            let valido = true;

            const camposParaValidar = estadoTela === 'recuperar' 
                ? [camposAuth[0]] 
                : camposAuth;

            camposParaValidar.forEach(campo => {
                const input = document.getElementById(campo.id);
                const valor = input.value.trim();

                if (!valor) {
                    mostrarErroAuth(campo.id, `${campo.nome} é obrigatório.`);
                    valido = false;
                    return;
                }

                if (campo.tipo === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(valor)) {
                    mostrarErroAuth(campo.id, 'Digite um e-mail válido.');
                    valido = false;
                } else {
                    if (input) input.classList.add('input-valid');
                }
            });

            return valido;
        }

        async function autenticar(e) {
            e.preventDefault();
            if (!validarFormularioAuth()) return;

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha') ? document.getElementById('senha').value : '';
            
            let rota = '/login';
            let dadosCorpo = { email, senha };

            if (estadoTela === 'cadastro') {
                rota = '/registrar';
            } else if (estadoTela === 'recuperar') {
                rota = '/esqueci-senha';
                dadosCorpo = { email };
            }

            try {
                const resp = await fetch(`${URL_API}${rota}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosCorpo)
                });

                const dados = await resp.json();

                if (resp.ok) {
                    if (estadoTela === 'login') {
                        localStorage.setItem('token', dados.token);
                        window.location.href = 'index.html';
                    } else if (estadoTela === 'cadastro') {
                        alert("Usuário criado! Agora faça o login.");
                        alternarModo();
                    } else if (estadoTela === 'recuperar') {
                        alert(dados.mensagem || "Verifique sua caixa de entrada para redefinir a senha.");
                        voltarParaLogin();
                    }
                } else {
                    alert(dados.error || "Erro na operação");
                }
            } catch (err) {
                alert("Erro ao conectar com o servidor.");
            }
        }

        function alternarModo() {
            limparErrosAuth();
            if (estadoTela === 'recuperar') {
                voltarParaLogin();
                return;
            }

            if (estadoTela === 'login') {
                estadoTela = 'cadastro';
                document.getElementById('titulo').innerText = 'Criar Conta';
                document.getElementById('btnAcao').innerText = 'CADASTRAR';
                document.getElementById('btnToggle').innerText = 'Já tenho conta, entrar';
                document.getElementById('btnEsqueci').style.display = 'none'; 
            } else {
                estadoTela = 'login';
                document.getElementById('titulo').innerText = 'Entrar';
                document.getElementById('btnAcao').innerText = 'ACESSAR';
                document.getElementById('btnToggle').innerText = 'Não tem conta? Cadastre-se';
                document.getElementById('btnEsqueci').style.display = 'block';
            }
        }

        function modoEsqueciSenha() {
            limparErrosAuth();
            estadoTela = 'recuperar';
            document.getElementById('titulo').innerText = 'Recuperar Senha';
            document.getElementById('campoSenha').style.display = 'none'; 
            document.getElementById('btnAcao').innerText = 'ENVIAR E-MAIL';
            document.getElementById('btnToggle').innerText = 'Voltar para o Login';
            document.getElementById('btnEsqueci').style.display = 'none';
        }

        function voltarParaLogin() {
            estadoTela = 'login';
            document.getElementById('titulo').innerText = 'Entrar';
            document.getElementById('campoSenha').style.display = 'block'; 
            document.getElementById('btnAcao').innerText = 'ACESSAR';
            document.getElementById('btnToggle').innerText = 'Não tem conta? Cadastre-se';
            document.getElementById('btnEsqueci').style.display = 'block';
        }

        formAuth.addEventListener('submit', autenticar);

        document.addEventListener('DOMContentLoaded', () => {
            const inputSenha = document.getElementById('senha');
            const btnMostrarSenha = document.getElementById('btn-mostrar-senha');

            function atualizarIconeSenha() {
                const mostrando = inputSenha.type === 'text';
                btnMostrarSenha.setAttribute('aria-label', mostrando ? 'Ocultar senha' : 'Mostrar senha');
                btnMostrarSenha.classList.toggle('is-visible', mostrando);

                btnMostrarSenha.innerHTML = mostrando
                    ? `
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 3l18 18" />
                            <path d="M10.6 6.3A10.3 10.3 0 0 1 12 6c6.5 0 10 6 10 6a18.8 18.8 0 0 1-4.2 4.8" />
                            <path d="M6.7 8.1A17.6 17.6 0 0 0 2 12s3.5 7 10 7a10.9 10.9 0 0 0 3.4-.6" />
                            <path d="M9.4 10.6a3 3 0 0 1 4.2-4.2" />
                        </svg>
                    `
                    : `
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    `;
            }

            if (btnMostrarSenha && inputSenha) {
                btnMostrarSenha.addEventListener('click', () => {
                    inputSenha.type = inputSenha.type === 'password' ? 'text' : 'password';
                    atualizarIconeSenha();
                });

                atualizarIconeSenha();
            }
        });
    </script>
</body>
</html>
