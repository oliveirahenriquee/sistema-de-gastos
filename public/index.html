<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Controle Financeiro</title>
</head>
<body>

    <div class="topbar">
        <button class="logout-button" onclick="fazerLogout()">Sair do Sistema</button>
    </div>

    <div class="container">
        <h2>Novo Lançamento</h2>
        <form id="formFinanceiro" novalidate>
            <div class="form-field">
                <input type="text" id="desc" placeholder="Descrição (Ex: Conta de luz, Mercado, Parcela etc)" required>
                <span class="field-error" id="descError"></span>
            </div>
            <div class="form-field">
                <input type="number" id="gastos" placeholder="Valor (R$)" step="0.01" required>
                <span class="field-error" id="gastosError"></span>
            </div>
            <div class="form-field">
                <input type="text" id="categoria" placeholder="Categoria (Ex: Custos fixos, Lazer, Reserva etc)" required>
                <span class="field-error" id="categoriaError"></span>
            </div>
            <button type="submit">CADASTRAR NO SISTEMA</button>
        </form>
        
        <div class="info-panel">
            <h3>Total no Filtro</h3>
            <div id="valorTotal">R$ 0,00</div>
        </div>
    </div>

    <div class="filtro-area">
        <div class="filtro-grupo">
            <label>Categoria</label>
            <select id="filtroCategoria" onchange="carregarDados()">
                <option value="Todos">Todas</option>
            </select>
        </div>
        <div class="filtro-grupo">
            <label>Mês</label>
            <input type="month" id="filtroMes" onchange="carregarDados()">
        </div>
    </div>

    <div class="chart-card">
       <canvas id="graficoGastos"></canvas>
    </div>

    <div class="campo-senha-container" style="position: relative; display: flex; align-items: center;">
    <input type="password" id="senha" placeholder="Digite sua senha" style="padding-right: 40px; width: 100%;">
    <button type="button" id="btn-mostrar-senha" style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 18px;">
        👁️
    </button>
    </div>

    <h2>Histórico</h2>
    <table>
        <thead>
            <tr>
                <th>Descrição</th>
                <th>Gasto</th>
                <th>Categoria</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaDados"></tbody>
    </table>

    <script>

        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        const URL_API = window.location.origin;

        function fazerLogout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        const formFinanceiro = document.getElementById('formFinanceiro');
        const camposFinanceiro = [
            { id: 'desc', nome: 'Descrição' },
            { id: 'gastos', nome: 'Valor', tipo: 'number' },
            { id: 'categoria', nome: 'Categoria' }
        ];

        function limparErrosFinanceiro() {
            camposFinanceiro.forEach(campo => {
                const input = document.getElementById(campo.id);
                const erro = document.getElementById(`${campo.id}Error`);
                input.classList.remove('input-error', 'input-valid');
                if (erro) erro.innerText = '';
            });
        }

        function mostrarErroFinanceiro(id, mensagem) {
            const input = document.getElementById(id);
            const erro = document.getElementById(`${id}Error`);
            input.classList.add('input-error');
            input.classList.remove('input-valid');
            if (erro) erro.innerText = mensagem;
        }

        function validarFormularioFinanceiro() {
            limparErrosFinanceiro();
            let valido = true;

            camposFinanceiro.forEach(campo => {
                const input = document.getElementById(campo.id);
                const valor = input.value.trim();

                if (!valor) {
                    mostrarErroFinanceiro(campo.id, `${campo.nome} é obrigatório.`);
                    valido = false;
                    return;
                }

                if (campo.tipo === 'number' && (isNaN(Number(valor)) || Number(valor) <= 0)) {
                    mostrarErroFinanceiro(campo.id, `Digite um ${campo.nome.toLowerCase()} válido.`);
                    valido = false;
                } else {
                    input.classList.add('input-valid');
                }
            });

            return valido;
        }

        formFinanceiro.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!validarFormularioFinanceiro()) return;

            const dados = {
                descricao: document.getElementById('desc').value.trim(),
                valor_gastos: Number(document.getElementById('gastos').value),
                categoria: document.getElementById('categoria').value.trim()
            };

            const resp = await fetch(`${URL_API}/salvar`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(dados)
            });

            if (resp.ok) {
                alert("Lançamento realizado!");
                e.target.reset();
                limparErrosFinanceiro();
                carregarDados();
            } else {
                alert("Erro ao salvar. Verifique se o login ainda é válido.");
            }
        });

        // 3. Listar Gastos (Com Token)
        async function carregarDados() {
            try {
                const resp = await fetch(`${URL_API}/listar`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (resp.status === 401 || resp.status === 403) {
                    fazerLogout();
                    return;
                }

                const dados = await resp.json();
                
                if (!Array.isArray(dados)) {
                    console.error("O servidor não retornou uma lista:", dados);
                    return;
                }
                
                const corpoTabela = document.getElementById('tabelaDados');
                const displayTotal = document.getElementById('valorTotal');
                const selCategoria = document.getElementById('filtroCategoria');
                
                const filtroCat = selCategoria.value;
                const filtroMes = document.getElementById('filtroMes').value;

                corpoTabela.innerHTML = ""; 
                let somaContador = 0;
                let categoriasUnicas = new Set(["Todos"]);
                let dadosFiltradosParaOGrafico = [];

                dados.forEach(item => {
                    categoriasUnicas.add(item.categoria);
                    
                    const dataObj = item.data_registro ? new Date(item.data_registro) : new Date();
                    const dataFormatada = dataObj.toLocaleDateString('pt-BR');
                    const mesAnoItem = dataObj.toISOString().substring(0, 7);

                    const bateCategoria = (filtroCat === "Todos" || item.categoria === filtroCat);
                    const bateMes = (!filtroMes || mesAnoItem === filtroMes);

                    if (bateCategoria && bateMes) {
                        somaContador += parseFloat(item.valor_gastos || 0);
                        dadosFiltradosParaOGrafico.push(item); 

                        corpoTabela.innerHTML += `
                            <tr>
                                <td>${item.descricao}</td>
                                <td>R$ ${parseFloat(item.valor_gastos || 0).toFixed(2)}</td>
                                <td>${item.categoria}</td>
                                <td>${dataFormatada}</td>
                                <td>
                                    <button onclick="excluirGasto(${item.id})" style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; width: auto;">X</button>
                                </td>
                            </tr>
                        `;
                    }
                });

                displayTotal.innerText = `R$ ${somaContador.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
                
                const valorAntes = selCategoria.value;
                selCategoria.innerHTML = "";
                categoriasUnicas.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat;
                    opt.innerText = cat;
                    if(cat === valorAntes) opt.selected = true;
                    selCategoria.appendChild(opt);
                });

                renderizarGrafico(dadosFiltradosParaOGrafico);

            } catch (err) {
                console.error("Erro crítico ao carregar lista:", err);
            }
        }

        async function excluirGasto(id) {
            if (!confirm("Tem certeza que deseja excluir este gasto?")) return;
            
            try {
                const response = await fetch(`${URL_API}/excluir/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    alert("Gasto excluído com sucesso!");
                    carregarDados(); 
                } else {
                    const erro = await response.json();
                    alert(`Erro: ${erro.error || "Não foi possível excluir."}`);
                }
            } catch (error) {
                console.error("Erro na requisição de exclusão:", error);
            }
        }

        function renderizarGrafico(listaDeGastos) {
            const categorias = {};
            
            listaDeGastos.forEach(gasto => {
                if (gasto.categoria && gasto.valor_gastos) {
                    const catNome = gasto.categoria.trim();
                    if (!categorias[catNome]) {
                        categorias[catNome] = 0;
                    }
                    categorias[catNome] += parseFloat(gasto.valor_gastos);
                }
            });

            const labels = Object.keys(categorias);
            const valores = Object.values(categorias);

            if (labels.length === 0) {
                if (window.graficoFinanceiro) {
                    window.graficoFinanceiro.destroy();
                    window.graficoFinanceiro = null;
                }
                return;
            }

            const ctx = document.getElementById('graficoGastos').getContext('2d');
            
            if (window.graficoFinanceiro) {
                window.graficoFinanceiro.destroy();
            }

            window.graficoFinanceiro = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Gastos por categoria',
                        data: valores,
                        backgroundColor: labels.map((_, index) => {
                            const colors = ['#00d2ff', '#3a86ff', '#4cc9f0', '#7b2cbf', '#4895ef', '#58a6ff'];
                            return colors[index % colors.length];
                        }),
                        borderColor: '#0a0f1d',
                        borderWidth: 1,
                        borderRadius: 16,
                        maxBarThickness: 46
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 1100,
                        easing: 'easeOutQuart'
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#cbd5e1'
                            },
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            ticks: {
                                color: '#cbd5e1',
                                callback: value => `R$ ${value}`
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.08)'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(10,15,29,0.95)',
                            borderColor: '#00d2ff',
                            borderWidth: 1,
                            titleColor: '#ffffff',
                            bodyColor: '#cbd5e1',
                            callbacks: {
                                label: function(context) {
                                    const value = context.parsed.y ?? context.parsed;
                                    return `R$ ${Number(value).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
                                }
                            }
                        }
                    }
                }
            });
        }

        carregarDados();
    </script>
</body>
</html>
